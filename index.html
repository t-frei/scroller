<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Scroller">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Scroller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Start Screen -->
    <div id="start-screen" class="visible">
        <div class="start-header">
            <div class="logo-placeholder">Logo</div>
            <h1 class="logo-text">Scroller</h1>
        </div>
        <div id="folder-list" class="folder-list"></div>
    </div>

    <div id="video-container" class="hidden"></div>
    
    <!-- Fade-to-Black Gradient am unteren Rand -->
    <div id="bottom-gradient"></div>

    <!-- Burger Menu Oben Rechts -->
    <button id="btn-burger" class="burger-menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>
    
    <!-- Geometric Play/Pause Indicator -->
    <div id="play-indicator" class="indicator hidden">
        <div class="triangle"></div>
    </div>
    <div id="pause-indicator" class="indicator hidden">
        <div class="bars"></div>
    </div>
    
    <!-- Minimalistischer Progress-Bar (Scrubber) mit Dot -->
    <div id="progress-container">
        <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
    </div>

    <!-- UI Modal (Menu) -->
    <div id="modal-overlay" class="hidden">
        <div class="modal">
            <h2 id="modal-title">Menü</h2>
            <div id="menu-content"></div>
            <button id="btn-close-modal">Schliessen</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
